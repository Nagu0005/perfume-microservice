
worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Increase body size for large product image uploads
    client_max_body_size 100M;

    server {
        listen 80;

        location / {
            root   /usr/share/nginx/html;
            index  index.html admin-portal.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the api-gateway
        location /api/v1/ {
            proxy_pass http://api-gateway:8090/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Explicit proxy mappings for direct paths used in the frontend
        location /products/ { proxy_pass http://api-gateway:8090/products/; }
        location /cart/ { proxy_pass http://api-gateway:8090/cart/; }
        location /checkout/ { proxy_pass http://api-gateway:8090/checkout/; }
        location /orders/ { proxy_pass http://api-gateway:8090/orders/; }
        location /users/ { proxy_pass http://api-gateway:8090/users/; }
        location /auth/google/callback { proxy_pass http://api-gateway:8090/auth/google/callback; }
    }
}
