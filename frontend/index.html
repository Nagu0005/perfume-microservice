<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ookielz - Jewelry • Perfumes • Face Packs</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fdf8f6',
                            100: '#f2e8e5',
                            300: '#d4b4a8',
                            500: '#b48576',
                            600: '#9b6c5f',
                            800: '#5e4139',
                            900: '#4a332d',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-out forwards',
                        'slide-up': 'slideUp 0.8s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #fafafa;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .hero-pattern {
            background-color: #4a332d;
            background-image: radial-gradient(circle at 50% 50%, #5e4139 0%, #4a332d 100%);
            position: relative;
        }

        .hero-pattern::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: url('https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=2000&auto=format&fit=crop') center/cover;
            opacity: 0.3;
            mix-blend-mode: overlay;
        }

        .product-card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .img-container {
            overflow: hidden;
        }

        .img-container img {
            transition: transform 0.7s ease;
        }

        .product-card:hover .img-container img {
            transform: scale(1.05);
        }

        /* Hide scrollbar for cart sidebar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_BASE = isLocal ? 'http://localhost:8090/api/v1' : window.location.protocol + '//' + window.location.hostname + ':8090/api/v1';

        // React-safe Lucide Icon component - renders icons without conflicting with React's DOM
        function LIcon({ name, className = "" }) {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current) return;
                ref.current.innerHTML = '';
                try {
                    const iconData = lucide.icons[name];
                    if (!iconData) return;
                    const [tag, attrs, children] = iconData;
                    const svg = document.createElementNS('http://www.w3.org/2000/svg', tag);
                    Object.entries(attrs).forEach(([k, v]) => svg.setAttribute(k, v));
                    svg.removeAttribute('class');
                    // Parse className to get width/height
                    const sizeMatch = className.match(/w-(\d+)/);
                    if (sizeMatch) {
                        const rem = parseInt(sizeMatch[1]) * 0.25;
                        svg.setAttribute('width', `${rem}rem`);
                        svg.setAttribute('height', `${rem}rem`);
                    }
                    if (children && Array.isArray(children)) {
                        children.forEach(child => {
                            const [childTag, childAttrs] = child;
                            const el = document.createElementNS('http://www.w3.org/2000/svg', childTag);
                            Object.entries(childAttrs || {}).forEach(([k, v]) => el.setAttribute(k, v));
                            svg.appendChild(el);
                        });
                    }
                    ref.current.appendChild(svg);
                } catch (e) { console.warn('Icon error:', name, e); }
            }, [name, className]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
        }

        function UserFrontend() {
            // -- State --
            const [view, setView] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [products, setProducts] = useState([]);
            const [rates, setRates] = useState({});
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);

            const [searchQuery, setSearchQuery] = useState('');
            const [activeCategory, setActiveCategory] = useState('All');

            // -- Auth State --
            const [user, setUser] = useState(null); // { id, name, email, token }
            const [authLoading, setAuthLoading] = useState(false);
            const [authError, setAuthError] = useState('');
            const [authForm, setAuthForm] = useState({ name: '', email: '', password: '' });

            // On Mount: Check LocalStorage for User Session
            useEffect(() => {
                const storedUser = localStorage.getItem('aurora_user');
                if (storedUser) {
                    try {
                        setUser(JSON.parse(storedUser));
                    } catch (e) {
                        console.error('Failed to parse stored user');
                        localStorage.removeItem('aurora_user');
                    }
                }
            }, []);

            // Checkout state
            const [checkoutLoading, setCheckoutLoading] = useState(false);
            const [checkoutResult, setCheckoutResult] = useState(null);
            const [shippingAddress, setShippingAddress] = useState({ name: '', address: '', city: '', pincode: '', phone: '' });

            // Pre-fill shipping address from user's DB profile
            useEffect(() => {
                if (user && user.token) {
                    fetch(`${API_BASE}/users/profile`, {
                        headers: { 'Authorization': `Bearer ${user.token}` }
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success && data.data) {
                            const p = data.data;
                            setShippingAddress(prev => ({
                                name: prev.name || p.name || '',
                                address: prev.address || p.business_address || '',
                                city: prev.city || '',
                                pincode: prev.pincode || p.pincode || '',
                                phone: prev.phone || ''
                            }));
                        }
                    }).catch(err => console.warn('Could not pre-fill address:', err));
                }
            }, [user]);

            // -- Data Fetching --
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setLoading(true);
                        // Fetch products from catalog service
                        const prodRes = await fetch(`${API_BASE}/catalog`);
                        const prodData = await prodRes.json();
                        if (prodData.success) setProducts(prodData.data);

                        // Fetch exchange rates from currency service
                        const rateRes = await fetch(`${API_BASE}/currency/rates`);
                        const rateData = await rateRes.json();
                        if (rateData.success) {
                            const rateMap = {};
                            rateData.data.forEach(r => {
                                rateMap[r.code] = parseFloat(r.rate_to_inr);
                            });
                            setRates(rateMap);
                        }
                    } catch (err) {
                        console.error('Fetch error:', err);
                        setError('Failed to connect to microservices. Ensure API Gateway is running.');
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [view]);

            // -- Derived Data --
            const filteredProducts = useMemo(() => {
                let filtered = products;
                if (activeCategory !== 'All') {
                    filtered = filtered.filter(p => p.category === activeCategory);
                }
                if (searchQuery.trim() !== '') {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(p =>
                        p.name.toLowerCase().includes(q) ||
                        p.brand.toLowerCase().includes(q)
                    );
                }
                return filtered;
            }, [products, searchQuery, activeCategory]);

            // -- Cart Handlers --
            const addToCart = (product, quantity = 1) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + quantity } : item);
                    }
                    return [...prev, { ...product, qty: quantity }];
                });
                setIsCartOpen(true);
            };


            const updateQty = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQty = item.qty + delta;
                        return newQty > 0 ? { ...item, qty: newQty } : item;
                    }
                    return item;
                }).filter(item => item.qty > 0));
            };

            const removeFromCart = (id) => {
                setCart(prev => prev.filter(item => item.id !== id));
            };

            const cartCount = cart.reduce((acc, item) => acc + item.qty, 0);

            // -- Auth Handlers --
            const handleAuth = async (e, type) => {
                e.preventDefault();
                setAuthError('');

                // Strict client-side email format validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(authForm.email)) {
                    setAuthError('Please enter a valid email address format.');
                    return;
                }

                setAuthLoading(true);
                
                try {
                    const endpoint = type === 'register' ? '/users/register' : '/users/login';
                    const payload = type === 'register' ? 
                        { name: authForm.name, email: authForm.email, password: authForm.password } : 
                        { email: authForm.email, password: authForm.password };

                    const res = await fetch(`${API_BASE}${endpoint}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    
                    if (data.success) {
                        const userData = { ...data.data, token: data.token };
                        setUser(userData);
                        localStorage.setItem('aurora_user', JSON.stringify(userData));
                        setAuthForm({ name: '', email: '', password: '' });
                        goToHome();
                    } else {
                        setAuthError(data.error || 'Authentication failed');
                    }
                } catch (err) {
                    setAuthError('Network error. Please try again.');
                } finally {
                    setAuthLoading(false);
                }
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('aurora_user');
                goToHome();
            };

            // -- Checkout Handler --
            const handleCheckout = async (e) => {
                e.preventDefault();
                if (!shippingAddress.name || !shippingAddress.address || !shippingAddress.city || !shippingAddress.pincode || !shippingAddress.phone) {
                    alert('Please fill in all shipping details.');
                    return;
                }
                if (!user) {
                    alert('Please log in or register before checking out.');
                    setView('login');
                    return;
                }
                setCheckoutLoading(true);
                try {
                    const payload = {
                        user_id: user.id.toString(),
                        user_email: user.email,
                        user_name: user.name,
                        items: cart.map(item => ({
                            product_id: item.id,
                            name: item.name,
                            price: item.base_price + (item.base_price * (item.gst_percentage / 100)),
                            quantity: item.qty
                        })),
                        shipping_address: `${shippingAddress.name}, ${shippingAddress.address}, ${shippingAddress.city} - ${shippingAddress.pincode}, Ph: ${shippingAddress.phone}`
                    };

                    const headers = { 'Content-Type': 'application/json' };
                    if (user && user.token) {
                        headers['Authorization'] = `Bearer ${user.token}`;
                    }

                    const res = await fetch(`${API_BASE}/checkout`, {
                        method: 'POST',
                        headers,
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (data.success) {

                        // Also create an order in the order-service so it appears in My Orders
                        const PROTO_HOST = API_BASE.replace('/api/v1', '');
                        try {
                            await fetch(`${PROTO_HOST}/orders`, {
                                method: 'POST',
                                headers,
                                body: JSON.stringify({
                                    checkout_id: data.data.id,
                                    user_id: user.id.toString(),
                                    order_total: data.data.total_amount,
                                    shipping_address: payload.shipping_address
                                })
                            });
                        } catch(orderErr) {
                            console.warn('Order sync failed but checkout succeeded:', orderErr);
                        }

                        // Save shipping address to user's DB profile for next time
                        try {
                            await fetch(`${API_BASE}/users/profile`, {
                                method: 'PUT',
                                headers,
                                body: JSON.stringify({
                                    business_name: user.name,
                                    business_address: `${shippingAddress.address}, ${shippingAddress.city}`,
                                    pincode: shippingAddress.pincode
                                })
                            });
                        } catch(e) { console.warn('Address save failed:', e); }

                        setCheckoutResult(data.data);
                        setCart([]);
                        setIsCartOpen(false);
                        setView('order_confirmation');
                    } else {
                        alert('Checkout failed: ' + (data.error || 'Unknown error'));
                    }
                } catch (err) {
                    console.error('Checkout error:', err);
                    alert('Failed to connect to checkout service. Please try again.');
                } finally {
                    setCheckoutLoading(false);
                }
            };

            // -- Navigation Helpers --
            const goToHome = () => {
                setView('home');
                setSelectedProduct(null);
            };

            const goToProductDetail = (product) => {
                setSelectedProduct(product);
                setView('product_detail');
            };

            // Calculate GST and Totals helper
            const getPriceBreakdown = (price, gstPerc) => {
                const gstAmount = price * (gstPerc / 100);
                return {
                    base: price,
                    gstAmount: gstAmount,
                    total: price + gstAmount
                };
            };

            return (
                <div className="min-h-screen relative font-sans text-gray-800 flex flex-col">
                    {/* --- Global Navigation --- */}
                    <nav className={`fixed w-full z-40 transition-all duration-300 ${isScrolled || view !== 'home' ? 'glass-nav py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center space-x-8">
                                <button onClick={goToHome} className={`text-2xl font-serif font-bold italic tracking-wider transition-colors hover:scale-105 transform cursor-pointer ${isScrolled || view !== 'home' ? 'text-brand-900' : 'text-white'}`}>
                                    <img src="./logo.jpg" alt="Ookielz" className="h-10 w-auto object-contain" />
                                </button>
                                <div className={`hidden md:flex space-x-6 text-sm font-medium transition-colors ${isScrolled || view !== 'home' ? 'text-gray-600' : 'text-gray-200'}`}>
                                    <button onClick={() => { goToHome(); setActiveCategory('All'); setTimeout(() => document.getElementById('catalog').scrollIntoView(), 100) }} className="hover:text-brand-500 transition">Perfumes</button>
                                    <button onClick={() => { goToHome(); setActiveCategory('Men'); setTimeout(() => document.getElementById('catalog').scrollIntoView(), 100) }} className="hover:text-brand-500 transition">Men</button>
                                    <button onClick={() => { goToHome(); setActiveCategory('Women'); setTimeout(() => document.getElementById('catalog').scrollIntoView(), 100) }} className="hover:text-brand-500 transition">Women</button>
                                    <button onClick={() => { goToHome(); setActiveCategory('Kids'); setTimeout(() => document.getElementById('catalog').scrollIntoView(), 100) }} className="hover:text-brand-500 transition">Kids</button>
                                    <a href="/admin-portal.html" className="hover:text-brand-500 transition border-l border-gray-300 pl-4 font-bold text-brand-600">Admin</a>
                                </div>
                            </div>
                            <div className={`flex items-center space-x-5 transition-colors ${isScrolled || view !== 'home' ? 'text-gray-800' : 'text-white'}`}>
                                {/* Quick Search triggering scroll to catalog */}
                                <div className="hidden lg:flex items-center relative group">
                                    <input
                                        type="text"
                                        placeholder="Search..."
                                        value={searchQuery}
                                        onChange={(e) => {
                                            setSearchQuery(e.target.value);
                                            if (view !== 'home') goToHome();
                                            setTimeout(() => document.getElementById('catalog').scrollIntoView(), 100);
                                        }}
                                        className={`w-0 group-hover:w-48 transition-all duration-300 px-0 group-hover:px-3 py-1 bg-transparent border-b ${isScrolled || view !== 'home' ? 'border-gray-800 text-gray-800 placeholder-gray-500 focus:border-brand-500' : 'border-white text-white placeholder-gray-300 focus:border-brand-300'} outline-none text-sm`}
                                    />
                                    <button className="hover:text-brand-500 transition ml-2">
                                        <LIcon name="search" className="w-5 h-5" />
                                    </button>
                                </div>
                                {user ? (
                                    <div className="relative group cursor-pointer flex items-center">
                                        <div className="flex items-center hover:text-brand-500 transition">
                                            <div className="w-8 h-8 rounded-full bg-brand-100 border-2 border-brand-300 flex items-center justify-center mr-2">
                                                <LIcon name="user" className="w-4 h-4 text-brand-700" />
                                            </div>
                                            <span className="text-sm font-medium hidden md:inline">{user.name.split(' ')[0]}</span>
                                        </div>
                                        {/* Dropdown Menu */}
                                        <div className="absolute right-0 top-full mt-2 w-48 bg-white border border-gray-100 rounded-xl shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all transform origin-top border-t-2 border-t-brand-500">
                                            <div className="p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl">
                                                <p className="text-sm font-bold text-gray-800">{user.name}</p>
                                                <p className="text-xs text-gray-500 truncate">{user.email}</p>
                                            </div>
                                            <ul className="py-2 text-sm text-gray-700">
                                                <li>
                                                    <button onClick={() => setView('orders')} className="w-full text-left px-4 py-2 hover:bg-brand-50 hover:text-brand-600 transition flex items-center">
                                                        <LIcon name="package" className="w-4 h-4 mr-2" /> My Orders
                                                    </button>
                                                </li>
                                                <li>
                                                    <button onClick={handleLogout} className="w-full text-left px-4 py-2 hover:bg-brand-50 hover:text-red-600 transition flex items-center border-t border-gray-100 mt-1 pt-2">
                                                        <LIcon name="log-out" className="w-4 h-4 mr-2" /> Logout
                                                    </button>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={() => setView('login')} className="hover:text-brand-500 transition flex items-center">
                                        <LIcon name="user" className="w-5 h-5" />
                                        <span className="text-sm font-medium ml-1 hidden md:inline">Login</span>
                                    </button>
                                )}
                                <button onClick={() => setIsCartOpen(true)} className="relative hover:text-brand-500 transition cursor-pointer">
                                    <LIcon name="shopping-bag" className="w-5 h-5" />
                                    {cartCount > 0 && (
                                        <span className="absolute -top-2 -right-2 bg-brand-500 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">
                                            {cartCount}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* --- MAIN CONTENT SWITCHER --- */}
                    <div className="flex-grow flex flex-col">
                        {/* ======================================= */}
                        {/* HOME VIEW (Hero + Catalog + Features)   */}
                        {/* ======================================= */}
                        {view === 'home' && (
                            <div className="animate-fade-in flex-grow flex flex-col">
                                {/* Hero Section */}
                                <section className="hero-pattern pt-32 pb-40 px-6 overflow-hidden flex items-center min-h-[85vh]">
                                    <div className="max-w-7xl mx-auto w-full relative z-10 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                        <div className="animate-slide-up text-white">
                                            <span className="uppercase tracking-widest text-xs font-bold text-brand-300 mb-4 block">New Collection 2026</span>
                                            <h2 className="text-5xl md:text-7xl font-serif font-medium leading-tight mb-6">
                                                The Essence of<br /><span className="italic text-brand-300">Elegance.</span>
                                            </h2>
                                            <p className="text-brand-100 text-lg md:text-xl mb-10 max-w-md opacity-90 leading-relaxed text-gray-200">
                                                Discover our curated collection of luxury fragrances crafted for the modern individual. Leave an unforgettable trail.
                                            </p>
                                            <div className="flex space-x-4">
                                                <a href="#catalog" className="bg-white text-brand-900 px-8 py-4 rounded-none font-medium hover:bg-brand-100 hover:scale-105 transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                                                    Explore Collection
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* Features Banner */}
                                <section className="bg-brand-900 text-brand-100 py-8">
                                    <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8 text-center divide-y md:divide-y-0 md:divide-x divide-brand-800">
                                        <div className="flex flex-col items-center p-4">
                                            <LIcon name="truck" className="w-6 h-6 mb-3 text-brand-300" />
                                            <h4 className="font-serif text-lg mb-1">Free Shipping</h4>
                                            <p className="text-sm opacity-80">On all orders over ₹5000</p>
                                        </div>
                                        <div className="flex flex-col items-center p-4">
                                            <LIcon name="award" className="w-6 h-6 mb-3 text-brand-300" />
                                            <h4 className="font-serif text-lg mb-1">Authentic Guarantee</h4>
                                            <p className="text-sm opacity-80">100% original products</p>
                                        </div>
                                        <div className="flex flex-col items-center p-4">
                                            <LIcon name="gift" className="w-6 h-6 mb-3 text-brand-300" />
                                            <h4 className="font-serif text-lg mb-1">Complimentary Samples</h4>
                                            <p className="text-sm opacity-80">With every purchase</p>
                                        </div>
                                    </div>
                                </section>

                                {/* Product Catalog / Searching and Filtering */}
                                <section id="catalog" className="py-24 px-6 bg-white flex-grow">
                                    <div className="max-w-7xl mx-auto">
                                        <div className="text-center mb-10">
                                            <h3 className="font-serif text-4xl text-brand-900 mb-4">Signature Scents</h3>
                                            <div className="w-16 h-0.5 bg-brand-500 mx-auto"></div>
                                        </div>

                                        {/* FILTER AND SEARCH CONTROLS */}
                                        <div className="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                            {/* Category Buttons */}
                                            <div className="flex flex-wrap gap-2 justify-center">
                                                {['All', 'Men', 'Women', 'Unisex', 'Kids'].map(cat => (
                                                    <button
                                                        key={cat}
                                                        onClick={() => setActiveCategory(cat)}

                    {/* --- GLOBAL FOOTER --- */}
                    <footer className="bg-brand-900 text-brand-100 pt-16 pb-8 px-6 mt-auto">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                            <div className="col-span-1 md:col-span-2">
                                <h1 className="text-2xl font-serif font-bold italic tracking-wider text-white mb-6">
                                    <img src="./logo.jpg" alt="Ookielz" className="h-12 w-auto object-contain bg-white/20 p-2 rounded-lg" />
                                </h1>
                                <p className="text-sm opacity-80 max-w-sm leading-relaxed mb-6">
                                    Elevating your presence with the finest selection of luxury fragrances sourced globally. Experience the art of perfumery.
                                </p>
                            </div>
                            <div>
                                <h5 className="text-white font-medium mb-4 tracking-wider uppercase text-sm">Shop Categories</h5>
                                <ul className="space-y-3 text-sm opacity-80">
                                    <li><button onClick={() => { goToHome(); setActiveCategory('Men'); }} className="hover:text-white transition cursor-pointer">Men's Fragrances</button></li>
                                    <li><button onClick={() => { goToHome(); setActiveCategory('Women'); }} className="hover:text-white transition cursor-pointer">Women's Fragrances</button></li>
                                    <li><button onClick={() => { goToHome(); setActiveCategory('Unisex'); }} className="hover:text-white transition cursor-pointer">Unisex</button></li>
                                    <li><button onClick={() => { goToHome(); setActiveCategory('Kids'); }} className="hover:text-white transition cursor-pointer">Kids</button></li>
                                </ul>
                            </div>
                            <div>
                                <h5 className="text-white font-medium mb-4 tracking-wider uppercase text-sm">Customer Care</h5>
                                <ul className="space-y-3 text-sm opacity-80">
                                    <li><a href="#" className="hover:text-white transition">Contact Us</a></li>
                                    <li><a href="#" className="hover:text-white transition">Shipping Policy</a></li>
                                    <li><a href="#" className="hover:text-white transition">Returns</a></li>
                                    <li><a href="#" className="hover:text-white transition">FAQ</a></li>
                                </ul>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto text-center pt-8 border-t border-brand-800 text-xs opacity-60 flex justify-between items-center">
                            <span>&copy; {new Date().getFullYear()} Ookielz. All rights reserved. Built with React & Tailwind.</span>
                            <span>Admin Portal accessible internally.</span>
                        </div>
                    </footer>

                    {/* --- SHOPPING CART SIDEBAR (OVERLAY) --- */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-50 overflow-hidden">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={() => setIsCartOpen(false)}></div>
                            <div className="absolute inset-y-0 right-0 max-w-md w-full flex shadow-2xl">
                                <div className="w-full h-full bg-white flex flex-col animate-slide-up" style={{ animationName: 'slideLeft', animationDuration: '0.4s' }}>
                                    {/* Cart Header */}
                                    <div className="px-6 py-5 border-b border-gray-100 flex items-center justify-between bg-brand-50">
                                        <h2 className="text-xl font-serif font-semibold text-brand-900 flex items-center">
                                            <LIcon name="shopping-bag" className="w-5 h-5 mr-2 text-brand-600" /> Your Cart ({cartCount})
                                        </h2>
                                        <button onClick={() => setIsCartOpen(false)} className="text-gray-400 hover:text-gray-800 transition p-2 bg-white rounded-full shadow-sm">
                                            <LIcon name="x" className="w-5 h-5" />
                                        </button>
                                    </div>

                                    {/* Cart Items List */}
                                    <div className="flex-1 overflow-y-auto p-6 space-y-6 no-scrollbar">
                                        {cart.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-center text-gray-500">
                                                <LIcon name="shopping-cart" className="w-16 h-16 mb-4 text-gray-200" />
                                                <p className="text-lg font-medium text-gray-800">Your cart is empty</p>
                                                <p className="text-sm mt-2 max-w-[250px]">Discover our collections to find your signature scent.</p>
                                                <button onClick={() => setIsCartOpen(false)} className="mt-8 px-8 py-3 bg-brand-900 text-white rounded-full font-medium shadow-md hover:bg-brand-800 transition">Browse Products</button>
                                            </div>
                                        ) : (
                                            cart.map(item => {
                                                const gstAmnt = item.base_price * (item.gst_percentage / 100);
                                                const totalItemPrice = item.base_price + gstAmnt;
                                                return (
                                                    <div key={item.id} className="flex gap-4 border-b border-gray-100 pb-6 group mt-2 relative">
                                                        <div className="w-24 h-28 bg-gray-50 border border-gray-100 rounded-lg flex-shrink-0 flex items-center justify-center overflow-hidden">
                                                            <img src={item.image_url} alt={item.name} className="w-full h-full object-cover mix-blend-multiply" />
                                                        </div>
                                                        <div className="flex-1 flex flex-col justify-between">
                                                            <div>
                                                                <div className="flex justify-between items-start">
                                                                    <div className="pr-4">
                                                                        <p className="text-xs text-brand-500 font-bold tracking-widest uppercase mb-1">{item.brand}</p>
                                                                        <h4 className="font-serif font-bold text-gray-900 leading-tight">{item.name}</h4>
                                                                    </div>
                                                                    <button onClick={() => removeFromCart(item.id)} className="text-gray-300 hover:text-red-500 transition -mt-1 p-1" title="Remove">
                                                                        <LIcon name="trash-2" className="w-4 h-4" />
                                                                    </button>
                                                                </div>
                                                                <p className="text-xs text-gray-500 mt-1 line-clamp-1">{item.description}</p>
                                                            </div>
                                                            <div className="flex justify-between items-end mt-4">
                                                                <div className="flex items-center border border-gray-200 rounded-md bg-white">
                                                                    <button onClick={() => updateQty(item.id, -1)} className="w-8 h-8 flex items-center justify-center text-gray-500 hover:text-brand-600 hover:bg-brand-50 transition rounded-l-md">-</button>
                                                                    <span className="w-8 flex items-center justify-center text-sm font-semibold border-x border-gray-200">{item.qty}</span>
                                                                    <button onClick={() => updateQty(item.id, 1)} className="w-8 h-8 flex items-center justify-center text-gray-500 hover:text-brand-600 hover:bg-brand-50 transition rounded-r-md">+</button>
                                                                </div>
                                                                <div className="text-right">
                                                                    <p className="font-bold text-lg text-brand-900">₹{(totalItemPrice * item.qty).toLocaleString()}</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )
                                            })
                                        )}
                                    </div>

                                    {/* Cart Footer & Checkout Action */}
                                    {cart.length > 0 && (() => {
                                        const subTotal = cart.reduce((acc, item) => acc + (item.base_price * item.qty), 0);
                                        const totalGst = cart.reduce((acc, item) => acc + ((item.base_price * (item.gst_percentage / 100)) * item.qty), 0);
                                        const finalTotal = subTotal + totalGst;
                                        const shippingCost = finalTotal > 5000 ? 0 : 500;
                                        const totalToPay = finalTotal + shippingCost;

                                        return (
                                            <div className="border-t border-gray-200 bg-white">
                                                <div className="p-6 pb-4">
                                                    <div className="space-y-3 mb-4 text-sm text-gray-600">
                                                        <div className="flex justify-between">
                                                            <span>Subtotal</span>
                                                            <span className="font-medium text-gray-900">₹{subTotal.toLocaleString()}</span>
                                                        </div>
                                                        <div className="flex justify-between">
                                                            <span>Taxes (GST calculated)</span>
                                                            <span className="font-medium text-gray-900">+ ₹{totalGst.toLocaleString()}</span>
                                                        </div>
                                                        <div className="flex justify-between items-center">
                                                            <span>Shipping</span>
                                                            <span className={shippingCost === 0 ? "text-green-600 font-bold bg-green-50 px-2 py-0.5 rounded" : "text-gray-900 font-medium"}>
                                                                {shippingCost === 0 ? 'FREE' : `₹${shippingCost}`}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    <div className="h-px bg-gray-200 w-full mb-4"></div>
                                                    <div className="flex justify-between items-end mb-4">
                                                        <div>
                                                            <span className="font-serif font-bold text-lg text-gray-900 uppercase">Cart Total</span>
                                                            <p className="text-xs text-brand-600 mt-1">Includes all taxes</p>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className="text-3xl font-serif font-bold text-brand-900">
                                                                ₹{totalToPay.toLocaleString()}
                                                            </span>
                                                        </div>
                                                    </div>

                                                    {shippingCost > 0 && (
                                                        <div className="bg-blue-50 text-blue-800 text-xs px-3 py-2 rounded mb-4 flex items-center border border-blue-100">
                                                            <LIcon name="info" className="w-4 h-4 mr-2 text-blue-500 inline" />
                                                            Add ₹{(5001 - finalTotal).toLocaleString()} more to get FREE shipping!
                                                        </div>
                                                    )}

                                                    <button
                                                        onClick={() => { setIsCartOpen(false); setView('checkout'); }}
                                                        className="w-full bg-brand-900 text-white font-bold py-4 rounded-xl hover:bg-brand-800 transition tracking-wider uppercase text-sm shadow-xl flex items-center justify-center transform hover:-translate-y-1"
                                                    >
                                                        Proceed to Secure Checkout <LIcon name="lock" className="w-4 h-4 ml-2" />
                                                    </button>
                                                </div>
                                                <div className="text-center bg-gray-50 py-3 text-xs text-gray-500 font-medium flex justify-center items-center space-x-4 border-t border-gray-200">
                                                    <span className="flex items-center"><LIcon name="shield-check" className="w-3 h-3 mr-1" /> Secure</span>
                                                    <span>|</span>
                                                    <span className="flex items-center"><LIcon name="truck" className="w-3 h-3 mr-1" /> Fast Delivery</span>
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Add slideLeft animation style dynamically
        const styleSheet = document.createElement("style");
        styleSheet.type = "text/css";
        styleSheet.innerText = `
            @keyframes slideLeft {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
        `;
        document.head.appendChild(styleSheet);


        // --- Order History Component ---
        function OrderHistory({ userId, token }) {
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const fetchOrders = async () => {
                    try {
                        setLoading(true);
                        const PROTO_HOST = API_BASE.replace('/api/v1', '');
                        const res = await fetch(`${PROTO_HOST}/orders?userId=${userId}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const data = await res.json();
                        if (data.success) {
                            setOrders(data.data || []);
                        } else {
                            setError(data.error || 'Failed to load orders');
                        }
                    } catch (err) {
                        setError('Could not connect to order service.');
                    } finally {
                        setLoading(false);
                    }
                };
                fetchOrders();
            }, [userId, token]);

            const statusConfig = {
                'PENDING': { color: 'bg-yellow-100 text-yellow-800 border-yellow-200', icon: 'clock', label: 'Pending' },
                'PROCESSING': { color: 'bg-blue-100 text-blue-800 border-blue-200', icon: 'loader', label: 'Processing' },
                'SHIPPED': { color: 'bg-purple-100 text-purple-800 border-purple-200', icon: 'truck', label: 'Shipped' },
                'DELIVERED': { color: 'bg-green-100 text-green-800 border-green-200', icon: 'check-circle', label: 'Delivered' },
            };

            const getStatus = (s) => statusConfig[s] || statusConfig['PENDING'];

            if (loading) return (
                <div className="space-y-4">
                    {[1,2,3].map(i => (
                        <div key={i} className="animate-pulse bg-gray-50 rounded-2xl h-36 border border-gray-100"></div>
                    ))}
                </div>
            );

            if (error) return (
                <div className="text-center py-20">
                    <LIcon name="alert-triangle" className="w-12 h-12 text-red-400 mx-auto mb-4" />
                    <p className="text-gray-600 font-medium">{error}</p>
                </div>
            );

            if (orders.length === 0) return (
                <div className="text-center py-20">
                    <div className="bg-brand-50 rounded-full w-24 h-24 mx-auto flex items-center justify-center mb-6">
                        <LIcon name="shopping-bag" className="w-10 h-10 text-brand-400" />
                    </div>
                    <h3 className="text-xl font-serif font-bold text-gray-800 mb-2">No Orders Yet</h3>
                    <p className="text-gray-500 text-sm">Your purchase history will appear here once you place your first order.</p>
                </div>
            );

            return (
                <div className="space-y-4">
                    {orders.map(order => {
                        const st = getStatus(order.status);
                        return (
                            <div key={order.id} className="bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition-shadow overflow-hidden">
                                {/* Order Header */}
                                <div className="flex flex-wrap items-center justify-between gap-4 px-6 py-4 bg-gray-50/70 border-b border-gray-100">
                                    <div className="flex items-center space-x-6">
                                        <div>
                                            <p className="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Order ID</p>
                                            <p className="font-bold text-brand-900 text-sm">#{order.id.toString().slice(0, 8).toUpperCase()}</p>
                                        </div>
                                        <div>
                                            <p className="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Placed On</p>
                                            <p className="text-sm text-gray-700 font-medium">{new Date(order.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</p>
                                        </div>
                                    </div>
                                    <div className={`px-3 py-1 rounded-full text-xs font-bold border flex items-center ${st.color}`}>
                                        <LIcon name={st.icon} className="w-3 h-3 mr-1.5" /> {st.label}
                                    </div>
                                </div>

                                {/* Progress Stepper */}
                                {(() => {
                                    const steps = [
                                        { key: 'CREATED', label: 'Order Placed', icon: 'shopping-bag' },
                                        { key: 'PROCESSING', label: 'Processing', icon: 'loader' },
                                        { key: 'SHIPPED', label: 'Shipped', icon: 'truck' },
                                        { key: 'DELIVERED', label: 'Delivered', icon: 'check-circle' }
                                    ];
                                    const statusOrder = ['CREATED', 'PROCESSING', 'SHIPPED', 'DELIVERED'];
                                    const currentIdx = statusOrder.indexOf(order.status);
                                    return (
                                        <div className="px-6 py-5 border-b border-gray-100">
                                            <div className="flex items-center justify-between relative">
                                                {steps.map((step, idx) => {
                                                    const isDone = idx <= currentIdx;
                                                    const isCurrent = idx === currentIdx;
                                                    return (
                                                        <React.Fragment key={step.key}>
                                                            <div className="flex flex-col items-center z-10" style={{minWidth:'60px'}}>
                                                                <div className={`w-9 h-9 rounded-full flex items-center justify-center mb-1.5 border-2 transition-all ${isDone ? 'bg-green-500 border-green-500 text-white' : 'bg-gray-100 border-gray-200 text-gray-400'} ${isCurrent ? 'ring-4 ring-green-100 scale-110' : ''}`}>
                                                                    <LIcon name={step.icon} className="w-4 h-4" />
                                                                </div>
                                                                <span className={`text-[10px] font-semibold text-center leading-tight ${isDone ? 'text-green-700' : 'text-gray-400'}`}>{step.label}</span>
                                                            </div>
                                                            {idx < steps.length - 1 && (
                                                                <div className="flex-1 h-0.5 mx-1 -mt-5">
                                                                    <div className={`h-full rounded-full transition-all ${idx < currentIdx ? 'bg-green-400' : 'bg-gray-200'}`}></div>
                                                                </div>
                                                            )}
                                                        </React.Fragment>
                                                    );
                                                })}
                                            </div>
                                            {order.tracking_number && (
                                                <div className="mt-3 flex items-center justify-center">
                                                    <span className="text-xs text-purple-700 bg-purple-50 px-3 py-1 rounded-full font-mono font-bold">
                                                        <LIcon name="map-pin" className="w-3 h-3 inline mr-1" />Tracking: {order.tracking_number}
                                                    </span>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()}

                                {/* Order Body */}
                                <div className="px-6 py-4">
                                    {/* Items */}
                                    {order.items && order.items.length > 0 ? (
                                        <div className="space-y-2 mb-4">
                                            {order.items.map((item, idx) => (
                                                <div key={idx} className="flex justify-between items-center text-sm">
                                                    <span className="text-gray-700">{item.product_name || `Product #${item.product_id}`} <span className="text-gray-400">x{item.quantity}</span></span>
                                                    <span className="font-semibold text-gray-800">{String.fromCharCode(8377)}{parseFloat(item.price_at_time || 0).toLocaleString()}</span>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <p className="text-sm text-gray-400 mb-4">Item details unavailable</p>
                                    )}

                                    {/* Footer Row */}
                                    <div className="flex flex-wrap items-center justify-between gap-4 pt-3 border-t border-gray-100">
                                        <div className="flex items-center text-xs text-gray-500">
                                            <LIcon name="clock" className="w-3 h-3 mr-1" />
                                            <span>{new Date(order.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}</span>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Total</p>
                                            <p className="text-lg font-bold text-brand-900">{String.fromCharCode(8377)}{parseFloat(order.order_total).toLocaleString()}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // --- Delivery Estimator Component ---
        function DeliveryEstimator({ sellerId }) {
            const [seller, setSeller] = useState(null);
            const [userPincode, setUserPincode] = useState('');
            const [estimate, setEstimate] = useState(null);
            const [loading, setLoading] = useState(true);
            const [calcLoading, setCalcLoading] = useState(false);

            useEffect(() => {
                if (!sellerId) {
                    setLoading(false);
                    return;
                }
                fetch(`${API_BASE}/users/public/${sellerId}`)
                    .then(res => res.json())
                    .then(data => {
                        if(data.success) setSeller(data.data);
                        setLoading(false);
                    }).catch(() => setLoading(false));
            }, [sellerId]);

            const calculateDelivery = async () => {
                if(!userPincode || userPincode.length !== 6) return;
                setCalcLoading(true);
                try {
                    const sellerPin = seller?.pincode || '400001'; // Default origin fallback
                    
                    // Fetch seller city
                    const sellerRes = await fetch(`https://api.postalpincode.in/pincode/${sellerPin}`);
                    const sellerData = await sellerRes.json();
                    const sellerCity = sellerData[0]?.PostOffice?.[0]?.District || 'Mumbai';
                    
                    // Fetch buyer city
                    const buyerRes = await fetch(`https://api.postalpincode.in/pincode/${userPincode}`);
                    const buyerData = await buyerRes.json();
                    const buyerCity = buyerData[0]?.PostOffice?.[0]?.District || 'Destination';

                    // Mock Transit Logic
                    const isLocal = sellerCity === buyerCity;
                    const days = isLocal ? '1-2 Days' : '4-6 Days';

                    setEstimate({ sellerCity, buyerCity, days });
                } catch (e) {
                    setEstimate({ sellerCity: 'Store', buyerCity: 'You', days: '3-5 Days' });
                }
                setCalcLoading(false);
            }

            if(loading) return <div className="animate-pulse bg-brand-50 h-10 w-full rounded mb-6"></div>;

            return (
                <div className="mb-8 p-4 border border-brand-200 rounded-xl bg-brand-50/30">
                    <h5 className="text-sm font-semibold text-gray-700 mb-3 flex items-center">
                        <LIcon name="store" className="w-4 h-4 mr-2 text-brand-600"/> 
                        Sold by: <span className="text-brand-900 ml-1">{seller?.business_name || 'Ookielz First-Party'}</span>
                    </h5>
                    <div className="flex items-center space-x-2">
                        <input 
                            type="text" 
                            placeholder="Enter deliver-to Pincode" 
                            className="border border-brand-200 px-3 py-2 rounded-lg text-sm w-48 focus:outline-brand-500 bg-white shadow-inner"
                            value={userPincode}
                            onChange={(e)=>setUserPincode(e.target.value)}
                            maxLength={6}
                        />
                        <button onClick={calculateDelivery} className="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg text-sm flex items-center shadow-md">
                            {calcLoading ? '...' : 'Check Transit'}
                        </button>
                    </div>
                    {estimate && !calcLoading && (
                        <div className="mt-4 bg-white p-4 rounded-lg border border-gray-100 shadow-sm animate-fade-in-up">
                            <div className="flex justify-between text-xs text-gray-500 font-medium mb-1 relative items-center px-2">
                                 <span className="flex flex-col items-center"><LIcon name="package" className="w-4 h-4 mb-1 text-brand-600"/> {estimate.sellerCity}</span>
                                 <span className="border-t-2 border-dashed border-gray-300 flex-grow mx-4 relative top-[-10px]">
                                     <LIcon name="truck" className="w-4 h-4 text-brand-400 absolute left-1/2 transform -translate-x-1/2 -top-2.5 bg-white px-1"/>
                                 </span>
                                 <span className="flex flex-col items-center"><LIcon name="home" className="w-4 h-4 mb-1 text-green-600"/> {estimate.buyerCity}</span>
                            </div>
                            <p className="text-sm font-bold text-gray-800 text-center mt-3 bg-brand-50 py-1 rounded mb-1">Expected Delivery: {estimate.days}</p>
                        </div>
                    )}
                </div>
            )
        }

        // --- Initialize App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UserFrontend />);


    </script>
</body>

</html>
