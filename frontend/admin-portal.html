<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ookielz - Admin Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fdf8f6',
                            100: '#f2e8e5',
                            500: '#b48576',
                            600: '#9b6c5f',
                            900: '#4a332d',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        // In production, Nginx listens on port 443 (HTTPS) and proxies to the API gateway.
        // Do NOT append :8090 in production — that would bypass Nginx and fail.
        const PROTO_HOST = isLocal ? 'http://localhost:8090' : window.location.protocol + '//' + window.location.hostname;
        const API_BASE = `${PROTO_HOST}/api/v1`;

        const updateChannel = new BroadcastChannel('perfume_updates');

        const LIcon = ({ name, className = "w-5 h-5", ...props }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return <i data-lucide={name} className={className} {...props}></i>;
        };


        // --- Main App Component ---
        function AdminPortal() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [token, setToken] = useState(localStorage.getItem('admin_token'));
            const [adminUser, setAdminUser] = useState(JSON.parse(localStorage.getItem('admin_user')) || null);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, adminUser]); // Re-run when navigation or auth status changes

            const handleLogout = () => {
                localStorage.removeItem('admin_token');
                localStorage.removeItem('admin_user');
                setToken(null);
                setAdminUser(null);
            };

            if (!token) {
                return <LoginScreen setToken={setToken} setAdminUser={setAdminUser} />;
            }

            return (
                <div className="flex h-screen overflow-hidden bg-gray-50">
                    {/* Sidebar */}
                    <aside className="w-64 bg-brand-900 text-white flex flex-col shadow-xl z-10">
                        <div className="p-6">
                            <h1 className="text-2xl font-bold tracking-wider text-brand-100 italic flex items-center">
                                <img src="./logo.jpg" alt="Ookielz" className="h-8 w-auto object-contain mr-2 bg-white/20 p-1 rounded" />
                                <span className="text-brand-500">Admin</span>
                            </h1>
                            <p className="text-sm text-brand-500 mt-1">Management Portal</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-8">
                            <button
                                onClick={() => setActiveTab('dashboard')}
                                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'dashboard' ? 'bg-brand-600 text-white shadow-md' : 'text-brand-100 hover:bg-brand-600/50'}`}
                            >
                                <i data-lucide="layout-dashboard" className="w-5 h-5"></i>
                                <span className="font-medium">Dashboard</span>
                            </button>
                            <button
                                onClick={() => setActiveTab('products')}
                                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'products' ? 'bg-brand-600 text-white shadow-md' : 'text-brand-100 hover:bg-brand-600/50'}`}
                            >
                                <i data-lucide="package" className="w-5 h-5"></i>
                                <span className="font-medium">Products</span>
                            </button>
                            <button
                                onClick={() => setActiveTab('orders')}
                                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'orders' ? 'bg-brand-600 text-white shadow-md' : 'text-brand-100 hover:bg-brand-600/50'}`}
                            >
                                <i data-lucide="clipboard-list" className="w-5 h-5"></i>
                                <span className="font-medium">Orders</span>
                            </button>
                            <button
                                onClick={() => setActiveTab('analytics')}
                                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'analytics' ? 'bg-brand-600 text-white shadow-md' : 'text-brand-100 hover:bg-brand-600/50'}`}
                            >
                                <i data-lucide="bar-chart-3" className="w-5 h-5"></i>
                                <span className="font-medium">Analytics</span>
                            </button>
                        </nav>
                        <div className="p-4">
                            <div className="bg-brand-600/30 rounded-lg p-4 text-sm flex justify-between items-center">
                                <div>
                                    <p className="text-brand-100 text-xs">Logged in as</p>
                                    <p className="font-semibold text-white truncate w-24">{adminUser?.name || 'Admin'}</p>
                                </div>
                                <button onClick={handleLogout} className="text-red-300 hover:text-red-100" title="Logout">
                                    <i data-lucide="log-out" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto p-8">
                        <header className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-3xl font-bold text-gray-800 capitalize">{activeTab}</h2>
                                <p className="text-gray-500 mt-1">Manage your perfume boutique store operations.</p>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button className="p-2 bg-white rounded-full shadow-sm hover:shadow-md transition">
                                    <i data-lucide="bell" className="w-5 h-5 text-gray-500"></i>
                                </button>
                                <img src={`https://ui-avatars.com/api/?name=${adminUser?.name || 'Admin'}&background=b48576&color=fff`} alt="Admin" className="w-10 h-10 rounded-full shadow-md border-2 border-white" />
                            </div>
                        </header>

                        {/* Route Content rendering */}
                        <div className="animate-fade-in-up transition-all duration-300">
                            {activeTab === 'dashboard' && <Dashboard token={token} />}
                            {activeTab === 'products' && <ProductManagement token={token} />}
                            {activeTab === 'orders' && <OrderManagement token={token} />}
                            {activeTab === 'analytics' && <Analytics token={token} />}
                        </div>
                    </main>
                </div>
            );
        }

        // --- Login Screen ---
        function LoginScreen({ setToken, setAdminUser }) {
            const [error, setError] = useState('');
            const GOOGLE_CLIENT_ID = "213029188924-7vufs1ig0isosmmjqq9vv7h2d3kvd3q6.apps.googleusercontent.com";

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const tokenFromUrl = urlParams.get('token');
                const userFromUrl = urlParams.get('user');
                const errFromUrl = urlParams.get('error');

                if (tokenFromUrl && userFromUrl) {
                    try {
                        const parsedUser = JSON.parse(decodeURIComponent(userFromUrl));
                        localStorage.setItem('admin_token', tokenFromUrl);
                        localStorage.setItem('admin_user', JSON.stringify(parsedUser));
                        setToken(tokenFromUrl);
                        setAdminUser(parsedUser);
                        window.history.replaceState({}, document.title, window.location.pathname);
                        return;
                    } catch(e) {
                         setError('Failed to parse user data from login.');
                    }
                } else if (errFromUrl) {
                    setError(decodeURIComponent(errFromUrl));
                    window.history.replaceState({}, document.title, window.location.pathname);
                }

                const initGoogle = () => {
                    const redirectUri = isLocal ? 'http://localhost:8090/auth/google/callback' : window.location.protocol + '//' + window.location.hostname + '/auth/google/callback';
                    if (window.google) {
                        window.google.accounts.id.initialize({
                            client_id: GOOGLE_CLIENT_ID,
                            login_uri: redirectUri,
                            ux_mode: "redirect",
                            callback: handleCredentialResponse
                        });
                        window.google.accounts.id.renderButton(
                            document.getElementById("google-signin-btn"),
                            { theme: "outline", size: "large", width: 300 }
                        );
                    }
                };

                if (window.google) {
                    initGoogle();
                } else {
                    const checkInterval = setInterval(() => {
                        if (window.google) {
                            initGoogle();
                            clearInterval(checkInterval);
                        }
                    }, 500);
                    return () => clearInterval(checkInterval);
                }
            }, []);

            const handleCredentialResponse = async (response) => {
                try {
                    const res = await fetch(`${API_BASE}/users/admin/google`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ credential: response.credential })
                    });

                    const data = await res.json();
                    if (data.success) {
                        localStorage.setItem('admin_token', data.token);
                        localStorage.setItem('admin_user', JSON.stringify(data.data));
                        setToken(data.token);
                        setAdminUser(data.data);
                    } else {
                        setError(data.error || 'Unauthorized Access. You must be an authorized seller.');
                    }
                } catch (err) {
                    setError('Server error during authentication.');
                }
            };

            return (
                <div className="flex h-screen items-center justify-center bg-gray-50 backdrop-blur-md">
                    <div className="glass-panel p-10 rounded-3xl shadow-2xl flex flex-col items-center max-w-md w-full text-center">
                        <img src="./logo.jpg" alt="Ookielz" className="h-20 w-auto mb-6 rounded shadow-md" />
                        <h2 className="text-3xl font-bold text-gray-800 mb-2">Admin Portal</h2>
                        <p className="text-gray-500 mb-8">Secure Access Required</p>

                        <div id="google-signin-btn" className="mb-4"></div>

                        {error && <div className="mt-4 p-3 bg-red-50 text-red-600 rounded-lg text-sm w-full font-medium shadow-inner">{error}</div>}
                    </div>
                </div>
            );
        }

        // --- Dashboard View ---
        function Dashboard({ token }) {
            const [stats, setStats] = useState({
                todaySales: 0,
                totalOrders: 0,
                monthSales: 0,
                topProduct: 'None',
                topProductUnits: 0,
                recentOrders: []
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchDashboardData = async () => {
                    try {
                        setLoading(true);
                        // Fetch Orders and Products (with Auth)
                        const [ordersRes, productsRes] = await Promise.all([
                            fetch(`${PROTO_HOST}/orders`, { headers: { 'Authorization': `Bearer ${token}` } }),
                            fetch(`${API_BASE}/catalog`)
                        ]);

                        const ordersData = await ordersRes.json();
                        const productsData = await productsRes.json();

                        const orders = ordersData.success ? ordersData.data : [];
                        const products = productsData.success ? productsData.data : [];

                        // Calculate metrics
                        const now = new Date();
                        const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

                        let todaySales = 0;
                        let monthSales = 0;
                        const productSalesInfo = {}; // { productId: { name, units } }

                        orders.forEach(order => {
                            const orderTime = new Date(order.created_at).getTime();
                            if (orderTime >= startOfMonth) monthSales += parseFloat(order.order_total);
                            if (orderTime >= startOfDay) todaySales += parseFloat(order.order_total);

                            // Map product sales
                            order.items?.forEach(item => {
                                if (!productSalesInfo[item.product_id]) {
                                    const product = products.find(p => p.id === item.product_id);
                                    productSalesInfo[item.product_id] = {
                                        name: product ? product.name : `Product #${item.product_id}`,
                                        units: 0
                                    };
                                }
                                productSalesInfo[item.product_id].units += item.quantity;
                            });
                        });

                        // Find top product
                        let topProd = { name: 'No Sales Yet', units: 0 };
                        Object.values(productSalesInfo).forEach(info => {
                            if (info.units > topProd.units) topProd = info;
                        });

                        setStats({
                            todaySales,
                            totalOrders: orders.length,
                            monthSales,
                            topProduct: topProd.name,
                            topProductUnits: topProd.units,
                            recentOrders: orders.slice(0, 5) // Get latest 5
                        });

                    } catch (err) {
                        console.error('Error fetching dashboard data:', err);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchDashboardData();
            }, []);

            if (loading) return <div className="p-10 text-center text-gray-500">Loading Dashboard...</div>;

            return (
                <div className="space-y-6">
                    {/* KPI Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 animate-fade-in-up">
                        <KPICard title="Today Sales" value={`₹${stats.todaySales.toLocaleString()}`} icon="indian-rupee" color="text-green-600" bg="bg-green-100" />
                        <KPICard title="Total Orders" value={stats.totalOrders.toString()} icon="shopping-bag" color="text-blue-600" bg="bg-blue-100" />
                        <KPICard title="This Month" value={`₹${stats.monthSales.toLocaleString()}`} icon="calendar" color="text-brand-600" bg="bg-brand-100" />
                        <KPICard title="Top Product" value={stats.topProduct} icon="trophy" color="text-yellow-600" bg="bg-yellow-100" subtitle={`${stats.topProductUnits} Units Sold`} />
                    </div>

                    {/* Example Dashboard Section */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in-up" style={{ animationDelay: '0.1s' }}>
                        <div className="lg:col-span-2 glass-panel rounded-2xl p-6">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Recent Orders</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="text-gray-500 text-sm">
                                            <th className="pb-3 font-semibold">Order ID</th>
                                            <th className="pb-3 font-semibold">Date</th>
                                            <th className="pb-3 font-semibold">Amount</th>
                                            <th className="pb-3 font-semibold">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {stats.recentOrders.length > 0 ? stats.recentOrders.map(order => (
                                            <tr key={order.id} className="border-t border-gray-100">
                                                <td className="py-3 font-medium text-brand-600">#ORD-{order.id.toString().slice(0, 6).toUpperCase()}</td>
                                                <td className="py-3 text-gray-500">{new Date(order.created_at).toLocaleString()}</td>
                                                <td className="py-3 font-semibold">₹{parseFloat(order.order_total).toLocaleString()}</td>
                                                <td className="py-3">
                                                    <span className={`px-2 py-1 rounded-full text-xs font-medium ${order.status === 'SHIPPED' ? 'bg-green-100 text-green-700' :
                                                        order.status === 'PENDING' ? 'bg-yellow-100 text-yellow-700' :
                                                            'bg-gray-100 text-gray-700'
                                                        }`}>
                                                        {order.status || 'PROCESSING'}
                                                    </span>
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr>
                                                <td colSpan="4" className="py-8 text-center text-gray-400">No recent orders found.</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="glass-panel rounded-2xl p-6">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Quick Stats</h3>
                            <div className="space-y-4 pt-2">
                                <div className="flex justify-between items-center">
                                    <span className="text-gray-500 text-sm">Target Monthly Sales</span>
                                    <span className="font-semibold text-gray-800">₹5,00,000</span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-2">
                                    <div className="bg-brand-500 h-2 rounded-full transition-all duration-1000" style={{ width: `${Math.min((stats.monthSales / 500000) * 100, 100)}%` }}></div>
                                </div>
                                <p className="text-right text-xs text-brand-600 font-medium">{((stats.monthSales / 500000) * 100).toFixed(1)}% Achieved</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- KPICard Component ---
        function KPICard({ title, value, icon, color, bg, trend, subtitle }) {
            return (
                <div className="glass-panel rounded-2xl p-6 hover:-translate-y-1 transition-transform duration-300">
                    <div className="flex justify-between items-start">
                        <div>
                            <p className="text-sm font-medium text-gray-500 mb-1">{title}</p>
                            <h3 className="text-2xl font-bold text-gray-800">{value}</h3>
                        </div>
                        <div className={`p-3 rounded-xl ${bg} ${color}`}>
                            <i data-lucide={icon} className="w-6 h-6"></i>
                        </div>
                    </div>
                    {(trend || subtitle) && (
                        <div className="mt-4 flex items-center text-sm">
                            {trend && (
                                <span className="flex items-center font-medium text-green-600 bg-green-50 px-2 py-0.5 rounded-full">
                                    <i data-lucide="trending-up" className="w-3 h-3 mr-1"></i>
                                    {trend}
                                </span>
                            )}
                            {subtitle && <span className="text-gray-500 font-medium">{subtitle}</span>}
                        </div>
                    )}
                </div>
            );
        }

        // --- Product Management View ---
        function ProductManagement({ token }) {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isAdding, setIsAdding] = useState(false);
            const [editingId, setEditingId] = useState(null);

            const [formData, setFormData] = useState({
                name: '', category: 'Perfume', sub_category: 'Men', brand: '', price: '', gst: 18, stock_quantity: '', image: '', images: [], description: ''
            });

            useEffect(() => {
                fetchProducts();
            }, []);

            const fetchProducts = async () => {
                try {
                    setLoading(true);
                    const res = await fetch(`${API_BASE}/catalog`);
                    const data = await res.json();
                    if (data.success) setProducts(data.data);
                } catch (err) {
                    setError('Failed to fetch products');
                } finally {
                    setLoading(false);
                }
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                if (files.length > 0) {
                    files.forEach(file => {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            setFormData(prev => ({
                                ...prev,
                                // Set first image as primary if not set
                                image: prev.image || reader.result,
                                images: [...prev.images, reader.result]
                            }));
                        };
                        reader.readAsDataURL(file);
                    });
                }
            };

            const removeImage = (index) => {
                setFormData(prev => {
                    const newImages = prev.images.filter((_, i) => i !== index);
                    return {
                        ...prev,
                        images: newImages,
                        image: newImages.length > 0 ? newImages[0] : ''
                    }
                });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    const payload = {
                        name: formData.name,
                        brand: formData.brand,
                        category: formData.category,
                        sub_category: formData.sub_category,
                        description: formData.description,
                        base_price: parseFloat(formData.price),
                        gst_percentage: parseFloat(formData.gst),
                        stock_quantity: parseInt(formData.stock_quantity),
                        image_url: formData.image || 'https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=600&auto=format&fit=crop',
                        images: formData.images
                    };

                    const method = editingId ? 'PUT' : 'POST';
                    const url = editingId ? `${API_BASE}/catalog/${editingId}` : `${API_BASE}/catalog`;

                    const res = await fetch(url, {
                        method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });

                    const data = await res.json();
                    if (data.success) {
                        fetchProducts();
                        resetForm();
                        updateChannel.postMessage('REFRESH_CATALOG');
                    } else {
                        alert('Error: ' + data.message);
                    }
                } catch (err) {
                    alert('Failed to save product');
                }
            };

            const handleEdit = (product) => {
                setFormData({
                    name: product.name,
                    brand: product.brand,
                    category: product.category,
                    sub_category: product.sub_category || 'Men',
                    description: product.description,
                    price: product.base_price,
                    gst: product.gst_percentage,
                    stock_quantity: product.stock_quantity || 0,
                    image: product.image_url,
                    images: product.images || []
                });
                setEditingId(product.id);
                setIsAdding(true);
            };

            const handleDelete = async (id) => {
                if (confirm('Are you sure you want to delete this product?')) {
                    try {
                        const res = await fetch(`${API_BASE}/catalog/${id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const data = await res.json();
                        if (data.success) {
                            fetchProducts();
                            updateChannel.postMessage('REFRESH_CATALOG');
                        }
                    } catch (err) {
                        alert('Failed to delete product');
                    }
                }
            };

            const resetForm = () => {
                setFormData({ name: '', brand: '', category: 'Perfume', sub_category: 'Men', price: '', gst: 18, stock_quantity: '', image: '', images: [], description: '' });
                setIsAdding(false);
                setEditingId(null);
            };

            const productPrice = parseFloat(formData.price) || 0;
            const gstPercentage = parseFloat(formData.gst) || 0;
            const gstAmount = productPrice * (gstPercentage / 100);
            const totalPrice = productPrice + gstAmount;

            return (

                <div className="space-y-6">
                    <div className="flex justify-between items-center glass-panel rounded-2xl p-4 px-6">
                        <h3 className="text-xl font-bold text-gray-800">Inventory Registry</h3>
                        {!isAdding && (
                            <button
                                onClick={() => setIsAdding(true)}
                                className="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg font-medium transition flex items-center shadow-md"
                            >
                                <i data-lucide="plus" className="w-4 h-4 mr-2"></i> Add New Product
                            </button>
                        )}
                    </div>

                    {/* Product Form (Add / Update) */}
                    {isAdding && (
                        <div className="glass-panel rounded-2xl p-6 shadow-lg border-t-4 border-brand-500 animate-fade-in-up">
                            <div className="flex justify-between items-center mb-6 border-b pb-4">
                                <h3 className="text-xl font-bold text-gray-800">{editingId ? 'Update Product Details' : 'Add New Product'}</h3>
                                <button onClick={resetForm} className="text-gray-400 hover:text-red-500 transition">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                            </div>

                            <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">

        // --- Order Management ---
        function OrderManagement({ token }) {
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [updating, setUpdating] = useState(null);

            const fetchOrders = async () => {
                try {
                    setLoading(true);
                    const res = await fetch(`${PROTO_HOST}/orders`, { headers: { 'Authorization': `Bearer ${token}` } });
                    const data = await res.json();
                    if (data.success) setOrders(data.data || []);
                } catch (e) { console.error('Failed to fetch orders:', e); }
                finally { setLoading(false); }
            };

            useEffect(() => { fetchOrders(); }, []);

            const updateStatus = async (orderId, newStatus, trackingNumber) => {
                setUpdating(orderId);
                try {
                    const body = { status: newStatus };
                    if (trackingNumber) body.tracking_number = trackingNumber;
                    const res = await fetch(`${PROTO_HOST}/orders/${orderId}/status`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify(body)
                    });
                    const data = await res.json();
                    if (data.success) fetchOrders();
                    else alert('Error: ' + (data.error || 'Failed'));
                } catch (e) { alert('Failed to update status'); }
                finally { setUpdating(null); }
            };

            const handleShip = (orderId) => {
                const tracking = prompt('Enter tracking number (required):');
                if (tracking && tracking.trim()) {
                    updateStatus(orderId, 'SHIPPED', tracking.trim());
                }
            };

            const statusBadge = (status) => {
                const map = {
                    'CREATED': 'bg-gray-100 text-gray-700',
                    'PROCESSING': 'bg-blue-100 text-blue-700',
                    'SHIPPED': 'bg-purple-100 text-purple-700',
                    'DELIVERED': 'bg-green-100 text-green-700'
                };
                return map[status] || map['CREATED'];
            };

            if (loading) return <div className="p-10 text-center text-gray-500">Loading Orders...</div>;

            if (orders.length === 0) return (
                <div className="text-center py-20">
                    <i data-lucide="inbox" className="w-16 h-16 text-gray-300 mx-auto mb-4"></i>
                    <p className="text-gray-500 text-lg font-medium">No orders yet</p>
                </div>
            );

            return (
                <div className="space-y-4">
                    {orders.map(order => (
                        <div key={order.id} className="glass-panel rounded-2xl overflow-hidden">
                            {/* Header */}
                            <div className="flex flex-wrap items-center justify-between gap-4 px-6 py-4 bg-gray-50 border-b border-gray-100">
                                <div className="flex items-center space-x-8">
                                    <div>
                                        <p className="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Order</p>
                                        <p className="font-bold text-brand-800">#ORD-{order.id}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Date</p>
                                        <p className="text-sm text-gray-700">{new Date(order.created_at).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' })}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Amount</p>
                                        <p className="text-sm font-bold text-gray-900">{String.fromCharCode(8377)}{parseFloat(order.order_total).toLocaleString()}</p>
                                    </div>
                                    <div className="bg-white/50 px-3 py-1.5 rounded-xl border border-gray-100 flex items-center">
                                        <div className={`p-1.5 rounded-lg mr-2 ${order.payment_method === 'Cash on Delivery' ? 'bg-yellow-50 text-yellow-600' : 'bg-blue-50 text-blue-600'}`}>
                                            <i data-lucide={order.payment_method === 'Cash on Delivery' ? 'banknote' : 'globe'} className="w-4 h-4"></i>
                                        </div>
                                        <div>
                                            <p className="text-[10px] uppercase tracking-widest text-gray-400 font-semibold leading-none">Payment</p>
                                            <p className="text-xs font-bold text-gray-800 mt-1">{order.payment_method || 'Online Payment'}</p>
                                        </div>
                                    </div>
                                </div>
                                <span className={`px-3 py-1 rounded-full text-xs font-bold ${statusBadge(order.status)}`}>
                                    {order.status}
                                </span>
                            </div>

                            {/* Progress Stepper */}
                            {(() => {
                                const steps = [
                                    { key: 'CREATED', label: 'Order Placed', icon: 'shopping-bag' },
                                    { key: 'PROCESSING', label: 'Processing', icon: 'loader' },
                                    { key: 'SHIPPED', label: 'Shipped', icon: 'truck' },
                                    { key: 'DELIVERED', label: 'Delivered', icon: 'check-circle' }
                                ];
                                const statusOrder = ['CREATED', 'PROCESSING', 'SHIPPED', 'DELIVERED'];
                                const currentIdx = statusOrder.indexOf(order.status);
                                return (
                                    <div className="px-6 py-5 border-b border-gray-100 bg-white">
                                        <div className="flex items-center justify-between relative">
                                            {steps.map((step, idx) => {
                                                const isDone = idx <= currentIdx;
                                                const isCurrent = idx === currentIdx;
                                                return (
                                                    <React.Fragment key={step.key}>
                                                        <div className="flex flex-col items-center z-10" style={{ minWidth: '70px' }}>
                                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center mb-1.5 border-2 transition-all ${isDone ? 'bg-green-500 border-green-500 text-white shadow-sm' : 'bg-gray-100 border-gray-200 text-gray-400'} ${isCurrent ? 'ring-4 ring-green-100 scale-110' : ''}`}>
                                                                <i data-lucide={step.icon} className="w-4 h-4"></i>
                                                            </div>
                                                            <span className={`text-[10px] font-semibold text-center leading-tight ${isDone ? 'text-green-700' : 'text-gray-400'}`}>{step.label}</span>
                                                        </div>
                                                        {idx < steps.length - 1 && (
                                                            <div className="flex-1 h-0.5 mx-1 -mt-5">
                                                                <div className={`h-full rounded-full transition-all ${idx < currentIdx ? 'bg-green-400' : 'bg-gray-200'}`}></div>
                                                            </div>
                                                        )}
                                                    </React.Fragment>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })()}

                            {/* Body */}
                            <div className="px-6 py-4 grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* Shipping Info */}
                                <div className="md:col-span-2">
                                    <p className="text-xs uppercase tracking-widest text-gray-400 font-semibold mb-2 flex items-center">
                                        <i data-lucide="map-pin" className="w-3 h-3 mr-1"></i> Shipping Address
                                    </p>
                                    <p className="text-sm text-gray-700 bg-gray-50 rounded-lg p-3 border border-gray-100">
                                        {order.shipping_address || 'Not provided (legacy order)'}
                                    </p>
                                    {order.tracking_number && (
                                        <div className="mt-3">
                                            <p className="text-xs uppercase tracking-widest text-gray-400 font-semibold mb-1">Tracking #</p>
                                            <p className="text-sm font-mono font-bold text-purple-700 bg-purple-50 px-3 py-1.5 rounded-lg inline-block">{order.tracking_number}</p>
                                        </div>
                                    )}

                                    {order.items && order.items.length > 0 && (
                                        <div className="mt-4 pt-4 border-t border-gray-100">
                                            <p className="text-[10px] uppercase tracking-widest text-gray-400 font-semibold mb-3 flex items-center">
                                                <i data-lucide="shopping-bag" className="w-3 h-3 mr-1"></i> Order Items
                                            </p>
                                            <div className="space-y-2">
                                                {order.items.map((item, idx) => (
                                                    <div key={idx} className="flex justify-between items-center text-xs">
                                                        <span className="text-gray-600">
                                                            <span className="font-bold text-gray-800">{item.product_name || `Product #${item.product_id}`}</span>
                                                            <span className="ml-2 px-1.5 py-0.5 bg-gray-100 rounded text-gray-500 font-bold">x{item.quantity}</span>
                                                        </span>
                                                        <span className="font-bold text-brand-900">₹{parseFloat(item.price_at_time).toLocaleString()}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* Actions */}
                                <div className="flex flex-col justify-center">
                                    <p className="text-xs uppercase tracking-widest text-gray-400 font-semibold mb-3 flex items-center">
                                        <i data-lucide="settings" className="w-3 h-3 mr-1"></i> Next Action
                                    </p>
                                    {order.status === 'CREATED' && (
                                        <button onClick={() => updateStatus(order.id, 'PROCESSING')} disabled={updating === order.id}
                                            className="w-full px-4 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition disabled:opacity-50 flex items-center justify-center">
                                            <i data-lucide="play" className="w-4 h-4 mr-2"></i>
                                            {updating === order.id ? 'Updating...' : 'Start Processing'}
                                        </button>
                                    )}
                                    {order.status === 'PROCESSING' && (
                                        <button onClick={() => handleShip(order.id)} disabled={updating === order.id}
                                            className="w-full px-4 py-2.5 bg-purple-600 text-white rounded-lg text-sm font-medium hover:bg-purple-700 transition disabled:opacity-50 flex items-center justify-center">
                                            <i data-lucide="truck" className="w-4 h-4 mr-2"></i>
                                            {updating === order.id ? 'Updating...' : 'Ship Order'}
                                        </button>
                                    )}
                                    {order.status === 'SHIPPED' && (
                                        <button onClick={() => updateStatus(order.id, 'DELIVERED')} disabled={updating === order.id}
                                            className="w-full px-4 py-2.5 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 transition disabled:opacity-50 flex items-center justify-center">
                                            <i data-lucide="check" className="w-4 h-4 mr-2"></i>
                                            {updating === order.id ? 'Updating...' : 'Mark Delivered'}
                                        </button>
                                    )}
                                    {order.status === 'DELIVERED' && (
                                        <div className="text-center py-2 bg-green-50 rounded-lg border border-green-100">
                                            <i data-lucide="check-circle" className="w-5 h-5 text-green-600 mx-auto mb-1"></i>
                                            <span className="text-sm text-green-700 font-semibold">Order Complete</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }


        // --- Render Application & Initialize Icons ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminPortal />);

        // Initialize Lucide icons after render
        setTimeout(() => {
            lucide.createIcons();
        }, 100);

        // Re-initialize icons whenever user clicks tab (to grab newly rendered icons)
        document.addEventListener('click', () => {
            setTimeout(() => {
                lucide.createIcons();
            }, 50);
        });
    </script>
</body>

</html>
