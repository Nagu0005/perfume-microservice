<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Perfumes - Admin Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fdf8f6',
                            100: '#f2e8e5',
                            500: '#b48576',
                            600: '#9b6c5f',
                            900: '#4a332d',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE = 'http://localhost:8090/api/v1';


        // --- Main App Component ---
        function AdminPortal() {
            const [activeTab, setActiveTab] = useState('dashboard');

            return (
                <div className="flex h-screen overflow-hidden bg-gray-50">
                    {/* Sidebar */}
                    <aside className="w-64 bg-brand-900 text-white flex flex-col shadow-xl z-10">
                        <div className="p-6">
                            <h1 className="text-2xl font-bold tracking-wider text-brand-100 italic">Aurora<span className="text-brand-500">Admin</span></h1>
                            <p className="text-sm text-brand-500 mt-1">Management Portal</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-8">
                            <button
                                onClick={() => setActiveTab('dashboard')}
                                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'dashboard' ? 'bg-brand-600 text-white shadow-md' : 'text-brand-100 hover:bg-brand-600/50'}`}
                            >
                                <i data-lucide="layout-dashboard" className="w-5 h-5"></i>
                                <span className="font-medium">Dashboard</span>
                            </button>
                            <button
                                onClick={() => setActiveTab('products')}
                                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'products' ? 'bg-brand-600 text-white shadow-md' : 'text-brand-100 hover:bg-brand-600/50'}`}
                            >
                                <i data-lucide="package" className="w-5 h-5"></i>
                                <span className="font-medium">Products</span>
                            </button>
                            <button
                                onClick={() => setActiveTab('analytics')}
                                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'analytics' ? 'bg-brand-600 text-white shadow-md' : 'text-brand-100 hover:bg-brand-600/50'}`}
                            >
                                <i data-lucide="bar-chart-3" className="w-5 h-5"></i>
                                <span className="font-medium">Analytics</span>
                            </button>
                        </nav>
                        <div className="p-4">
                            <div className="bg-brand-600/30 rounded-lg p-4 text-sm">
                                <p className="text-brand-100">Logged in as</p>
                                <p className="font-semibold text-white">Admin User</p>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto p-8">
                        <header className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-3xl font-bold text-gray-800 capitalize">{activeTab}</h2>
                                <p className="text-gray-500 mt-1">Manage your perfume boutique store operations.</p>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button className="p-2 bg-white rounded-full shadow-sm hover:shadow-md transition">
                                    <i data-lucide="bell" className="w-5 h-5 text-gray-500"></i>
                                </button>
                                <img src="https://ui-avatars.com/api/?name=Admin+User&background=b48576&color=fff" alt="Admin" className="w-10 h-10 rounded-full shadow-md border-2 border-white" />
                            </div>
                        </header>

                        {/* Route Content rendering */}
                        <div className="animate-fade-in-up transition-all duration-300">
                            {activeTab === 'dashboard' && <Dashboard />}
                            {activeTab === 'products' && <ProductManagement />}
                            {activeTab === 'analytics' && <Analytics />}
                        </div>
                    </main>
                </div>
            );
        }

        // --- Dashboard View ---
        function Dashboard() {
            const [stats, setStats] = useState({
                todaySales: 0,
                totalOrders: 0,
                monthSales: 0,
                topProduct: 'None',
                topProductUnits: 0,
                recentOrders: []
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchDashboardData = async () => {
                    try {
                        setLoading(true);
                        // Fetch Orders and Products
                        const [ordersRes, productsRes] = await Promise.all([
                            fetch('http://localhost:8090/orders'),
                            fetch(`${API_BASE}/catalog`)
                        ]);

                        const ordersData = await ordersRes.json();
                        const productsData = await productsRes.json();

                        const orders = ordersData.success ? ordersData.data : [];
                        const products = productsData.success ? productsData.data : [];

                        // Calculate metrics
                        const now = new Date();
                        const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

                        let todaySales = 0;
                        let monthSales = 0;
                        const productSalesInfo = {}; // { productId: { name, units } }

                        orders.forEach(order => {
                            const orderTime = new Date(order.created_at).getTime();
                            if (orderTime >= startOfMonth) monthSales += parseFloat(order.total_amount);
                            if (orderTime >= startOfDay) todaySales += parseFloat(order.total_amount);

                            // Map product sales
                            order.items?.forEach(item => {
                                if (!productSalesInfo[item.product_id]) {
                                    const product = products.find(p => p.id === item.product_id);
                                    productSalesInfo[item.product_id] = {
                                        name: product ? product.name : `Product #${item.product_id}`,
                                        units: 0
                                    };
                                }
                                productSalesInfo[item.product_id].units += item.quantity;
                            });
                        });

                        // Find top product
                        let topProd = { name: 'No Sales Yet', units: 0 };
                        Object.values(productSalesInfo).forEach(info => {
                            if (info.units > topProd.units) topProd = info;
                        });

                        setStats({
                            todaySales,
                            totalOrders: orders.length,
                            monthSales,
                            topProduct: topProd.name,
                            topProductUnits: topProd.units,
                            recentOrders: orders.slice(0, 5) // Get latest 5
                        });

                    } catch (err) {
                        console.error('Error fetching dashboard data:', err);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchDashboardData();
            }, []);

            if (loading) return <div className="p-10 text-center text-gray-500">Loading Dashboard...</div>;

            return (
                <div className="space-y-6">
                    {/* KPI Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 animate-fade-in-up">
                        <KPICard title="Today Sales" value={`₹${stats.todaySales.toLocaleString()}`} icon="indian-rupee" color="text-green-600" bg="bg-green-100" />
                        <KPICard title="Total Orders" value={stats.totalOrders.toString()} icon="shopping-bag" color="text-blue-600" bg="bg-blue-100" />
                        <KPICard title="This Month" value={`₹${stats.monthSales.toLocaleString()}`} icon="calendar" color="text-brand-600" bg="bg-brand-100" />
                        <KPICard title="Top Product" value={stats.topProduct} icon="trophy" color="text-yellow-600" bg="bg-yellow-100" subtitle={`${stats.topProductUnits} Units Sold`} />
                    </div>

                    {/* Example Dashboard Section */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in-up" style={{ animationDelay: '0.1s' }}>
                        <div className="lg:col-span-2 glass-panel rounded-2xl p-6">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Recent Orders</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="text-gray-500 text-sm">
                                            <th className="pb-3 font-semibold">Order ID</th>
                                            <th className="pb-3 font-semibold">Date</th>
                                            <th className="pb-3 font-semibold">Amount</th>
                                            <th className="pb-3 font-semibold">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {stats.recentOrders.length > 0 ? stats.recentOrders.map(order => (
                                            <tr key={order.id} className="border-t border-gray-100">
                                                <td className="py-3 font-medium text-brand-600">#ORD-{order.id.slice(0, 6).toUpperCase()}</td>
                                                <td className="py-3 text-gray-500">{new Date(order.created_at).toLocaleString()}</td>
                                                <td className="py-3 font-semibold">₹{parseFloat(order.total_amount).toLocaleString()}</td>
                                                <td className="py-3">
                                                    <span className={`px-2 py-1 rounded-full text-xs font-medium ${order.status === 'SHIPPED' ? 'bg-green-100 text-green-700' :
                                                        order.status === 'PENDING' ? 'bg-yellow-100 text-yellow-700' :
                                                            'bg-gray-100 text-gray-700'
                                                        }`}>
                                                        {order.status || 'PROCESSING'}
                                                    </span>
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr>
                                                <td colSpan="4" className="py-8 text-center text-gray-400">No recent orders found.</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="glass-panel rounded-2xl p-6">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Quick Stats</h3>
                            <div className="space-y-4 pt-2">
                                <div className="flex justify-between items-center">
                                    <span className="text-gray-500 text-sm">Target Monthly Sales</span>
                                    <span className="font-semibold text-gray-800">₹5,00,000</span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-2">
                                    <div className="bg-brand-500 h-2 rounded-full transition-all duration-1000" style={{ width: `${Math.min((stats.monthSales / 500000) * 100, 100)}%` }}></div>
                                </div>
                                <p className="text-right text-xs text-brand-600 font-medium">{((stats.monthSales / 500000) * 100).toFixed(1)}% Achieved</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- KPICard Component ---
        function KPICard({ title, value, icon, color, bg, trend, subtitle }) {
            return (
                <div className="glass-panel rounded-2xl p-6 hover:-translate-y-1 transition-transform duration-300">
                    <div className="flex justify-between items-start">
                        <div>
                            <p className="text-sm font-medium text-gray-500 mb-1">{title}</p>
                            <h3 className="text-2xl font-bold text-gray-800">{value}</h3>
                        </div>
                        <div className={`p-3 rounded-xl ${bg} ${color}`}>
                            <i data-lucide={icon} className="w-6 h-6"></i>
                        </div>
                    </div>
                    {(trend || subtitle) && (
                        <div className="mt-4 flex items-center text-sm">
                            {trend && (
                                <span className="flex items-center font-medium text-green-600 bg-green-50 px-2 py-0.5 rounded-full">
                                    <i data-lucide="trending-up" className="w-3 h-3 mr-1"></i>
                                    {trend}
                                </span>
                            )}
                            {subtitle && <span className="text-gray-500 font-medium">{subtitle}</span>}
                        </div>
                    )}
                </div>
            );
        }

        // --- Product Management View ---
        function ProductManagement() {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isAdding, setIsAdding] = useState(false);
            const [editingId, setEditingId] = useState(null);

            const [formData, setFormData] = useState({
                name: '', category: 'Men', brand: '', price: '', gst: 18, stock: '', image: '', description: ''
            });

            useEffect(() => {
                fetchProducts();
            }, []);

            const fetchProducts = async () => {
                try {
                    setLoading(true);
                    const res = await fetch(`${API_BASE}/catalog`);
                    const data = await res.json();
                    if (data.success) setProducts(data.data);
                } catch (err) {
                    setError('Failed to fetch products');
                } finally {
                    setLoading(false);
                }
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setFormData(prev => ({ ...prev, image: reader.result }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    const payload = {
                        name: formData.name,
                        brand: formData.brand,
                        category: formData.category,
                        description: formData.description,
                        base_price: parseFloat(formData.price),
                        gst_percentage: parseFloat(formData.gst),
                        stock: parseInt(formData.stock),
                        image_url: formData.image || 'https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=600&auto=format&fit=crop'
                    };

                    const method = editingId ? 'PUT' : 'POST';
                    const url = editingId ? `${API_BASE}/catalog/${editingId}` : `${API_BASE}/catalog`;

                    const res = await fetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await res.json();
                    if (data.success) {
                        fetchProducts();
                        resetForm();
                    } else {
                        alert('Error: ' + data.message);
                    }
                } catch (err) {
                    alert('Failed to save product');
                }
            };

            const handleEdit = (product) => {
                setFormData({
                    name: product.name,
                    brand: product.brand,
                    category: product.category,
                    description: product.description,
                    price: product.base_price,
                    gst: product.gst_percentage,
                    stock: product.stock,
                    image: product.image_url
                });
                setEditingId(product.id);
                setIsAdding(true);
            };

            const handleDelete = async (id) => {
                if (confirm('Are you sure you want to delete this product?')) {
                    try {
                        const res = await fetch(`${API_BASE}/catalog/${id}`, { method: 'DELETE' });
                        const data = await res.json();
                        if (data.success) fetchProducts();
                    } catch (err) {
                        alert('Failed to delete product');
                    }
                }
            };

            const resetForm = () => {
                setFormData({ name: '', brand: '', category: 'Men', price: '', gst: 18, stock: '', image: '', description: '' });
                setIsAdding(false);
                setEditingId(null);
            };

            const productPrice = parseFloat(formData.price) || 0;
            const gstPercentage = parseFloat(formData.gst) || 0;
            const gstAmount = productPrice * (gstPercentage / 100);
            const totalPrice = productPrice + gstAmount;

            return (

                <div className="space-y-6">
                    <div className="flex justify-between items-center glass-panel rounded-2xl p-4 px-6">
                        <h3 className="text-xl font-bold text-gray-800">Inventory Registry</h3>
                        {!isAdding && (
                            <button
                                onClick={() => setIsAdding(true)}
                                className="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg font-medium transition flex items-center shadow-md"
                            >
                                <i data-lucide="plus" className="w-4 h-4 mr-2"></i> Add New Product
                            </button>
                        )}
                    </div>

                    {/* Product Form (Add / Update) */}
                    {isAdding && (
                        <div className="glass-panel rounded-2xl p-6 shadow-lg border-t-4 border-brand-500 animate-fade-in-up">
                            <div className="flex justify-between items-center mb-6 border-b pb-4">
                                <h3 className="text-xl font-bold text-gray-800">{editingId ? 'Update Product Details' : 'Add New Product'}</h3>
                                <button onClick={resetForm} className="text-gray-400 hover:text-red-500 transition">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                            </div>

                            <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                                {/* Left Col - Inputs */}
                                <div className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-1">Product Name</label>
                                        <input required type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition" placeholder="e.g. Noir" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-1">Brand Name</label>
                                        <input required type="text" name="brand" value={formData.brand} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition" placeholder="e.g. Tom Ford" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">Category</label>
                                            <select name="category" value={formData.category} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none bg-white transition">
                                                <option value="Men">Men</option>
                                                <option value="Women">Women</option>
                                                <option value="Unisex">Unisex</option>
                                                <option value="Kids">Kids</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">Stock Quantity</label>
                                            <input required type="number" name="stock" value={formData.stock} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition" placeholder="Units" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-1">Description</label>
                                        <textarea name="description" value={formData.description} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition h-20" placeholder="Product description..."></textarea>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-1">Upload Product Image</label>
                                        <div className="flex items-center justify-center w-full">
                                            <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
                                                <div className="flex flex-col items-center justify-center pt-5 pb-6 text-gray-500">
                                                    <i data-lucide="upload-cloud" className="w-8 h-8 mb-2 text-brand-500"></i>
                                                    <p className="text-sm"><span className="font-semibold text-brand-600">Click to upload</span> or drag and drop</p>
                                                    <p className="text-xs mt-1">PNG, JPG or WEBP (MAX. 800x400px)</p>
                                                </div>
                                                <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                {/* Right Col - Pricing Engine */}
                                <div className="bg-gray-50/50 p-6 rounded-xl border border-gray-200 shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-3 bg-brand-100 rounded-bl-2xl">
                                        <i data-lucide="calculator" className="w-5 h-5 text-brand-600"></i>
                                    </div>
                                    <h4 className="text-lg font-bold text-gray-800 mb-4 inline-flex items-center">
                                        Price Calculation Engine
                                    </h4>

                                    <div className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-semibold text-gray-700 mb-1">Base Price (₹) `product_price`</label>
                                                <input required type="number" name="price" value={formData.price} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none text-right font-medium transition" placeholder="2000" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-gray-700 mb-1">GST (%) `gst_percentage`</label>
                                                <select name="gst" value={formData.gst} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none bg-white text-right font-medium transition">
                                                    <option value="0">0%</option>
                                                    <option value="5">5%</option>
                                                    <option value="12">12%</option>
                                                    <option value="18">18%</option>
                                                    <option value="28">28%</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div className="mt-6 space-y-3 pt-4 border-t border-gray-200">
                                            <div className="flex justify-between items-center text-gray-600">
                                                <span className="text-sm font-medium tracking-wide">Calculated GST Amount `gst_amount`</span>
                                                <span className="font-semibold text-red-500">+ ₹{gstAmount.toFixed(2)}</span>
                                            </div>
                                            <div className="flex justify-between items-center bg-brand-900 text-white p-4 rounded-xl shadow-inner mt-2">
                                                <span className="text-base font-bold">Final Selling Price `total_price`</span>
                                                <span className="text-2xl font-bold tracking-tight">₹{totalPrice.toFixed(2)}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="md:col-span-2 flex justify-end space-x-4 mt-4 pt-4 border-t border-gray-100">
                                    <button type="button" onClick={resetForm} className="px-6 py-2.5 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition">Cancel</button>
                                    <button type="submit" className="px-6 py-2.5 bg-brand-600 text-white rounded-lg font-bold shadow-md hover:bg-brand-700 hover:shadow-lg transition">
                                        {editingId ? 'Update Product' : 'Save Product'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Product List Table */}
                    <div className="glass-panel rounded-2xl overflow-hidden shadow-sm">
                        <table className="min-w-full divide-y divide-gray-200">
                            <thead className="bg-gray-50/80">
                                <tr>
                                    <th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Product</th>
                                    <th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Category</th>
                                    <th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Base Price</th>
                                    <th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">GST</th>
                                    <th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Final Price</th>
                                    <th className="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="bg-white divide-y divide-gray-100">
                                {products.map(product => {
                                    return (
                                        <tr key={product.id} className="hover:bg-brand-50/30 transition-colors">
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <div className="flex items-center">
                                                    <div className="flex-shrink-0 h-10 w-10">
                                                        <img className="h-10 w-10 rounded-lg object-cover shadow-sm" src={product.image_url} alt="" />
                                                    </div>
                                                    <div className="ml-4">
                                                        <div className="text-sm font-bold text-gray-900">{product.brand} - {product.name}</div>
                                                        <div className="text-sm text-gray-500 mt-0.5">Stock: {product.stock} units</div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <span className="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">
                                                    {product.category}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-700 font-medium">₹{product.base_price.toLocaleString()}</td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm">
                                                <span className="text-gray-900 font-medium">{product.gst_percentage}%</span>
                                                <span className="text-gray-400 text-xs block">(₹{product.gst_amount.toFixed(2)})</span>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-bold text-brand-900">₹{product.total_price.toLocaleString()}</td>
                                            <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                                <button onClick={() => handleEdit(product)} className="text-indigo-600 hover:text-indigo-900 mr-4 bg-indigo-50 p-2 rounded-lg transition" title="Edit">
                                                    <i data-lucide="edit-3" className="w-4 h-4"></i>
                                                </button>
                                                <button onClick={() => handleDelete(product.id)} className="text-red-600 hover:text-red-900 bg-red-50 p-2 rounded-lg transition" title="Delete">
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    );
                                })}
                                {products.length === 0 && (
                                    <tr>
                                        <td colSpan="6" className="px-6 py-12 text-center text-gray-500">
                                            <i data-lucide="package-x" className="w-12 h-12 mx-auto mb-3 text-gray-300"></i>
                                            <p className="text-lg font-medium">No products found</p>
                                            <p className="text-sm mt-1">Start by adding a new product to your inventory.</p>
                                        </td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">

                                        <option>Last 7 Days</option>
                                        <option>Last 30 Days</option>
                                    </select>
                                </div>
                                <div className="h-48 flex items-end justify-between space-x-2 pt-4 border-t border-gray-100">
                                    {/* Mock Bar Chart */}
                                    {[30, 50, 40, 70, 60, 90, 80].map((h, i) => (
                                        <div key={i} className="w-full bg-brand-100 rounded-t flex flex-col justify-end group">
                                            <div className="w-full bg-brand-500 rounded-t group-hover:bg-brand-600 transition-all duration-300 cursor-pointer" style={{ height: `${h}%` }}></div>
                                        </div>
                                    ))}

                                </div>
                            </div>

                            <div className="border border-gray-200 rounded-xl p-5 bg-white shadow-sm hover:shadow-md transition">
                                <h4 className="font-bold text-gray-700 flex items-center mb-6">
                                    <i data-lucide="pie-chart" className="w-5 h-5 mr-2 text-brand-500"></i> Sales by Category
                                </h4>
                                <div className="flex items-center justify-center space-x-8">
                                    <div className="relative w-32 h-32 rounded-full border-[16px] border-brand-500 border-r-pink-300 border-b-pink-300 transform -rotate-45 shadow-inner"></div>
                                    <div className="space-y-3">
                                        <div className="flex items-center">
                                            <span className="w-3 h-3 rounded-full bg-brand-500 mr-2 shadow-sm"></span>
                                            <span className="text-sm font-medium text-gray-600">Men (55%)</span>
                                        </div>
                                        <div className="flex items-center">
                                            <span className="w-3 h-3 rounded-full bg-pink-300 mr-2 shadow-sm"></span>
                                            <span className="text-sm font-medium text-gray-600">Women (45%)</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="border border-gray-200 rounded-xl p-5 bg-white shadow-sm hover:shadow-md transition">
                                <h4 className="font-bold text-gray-700 flex items-center mb-4">
                                    <i data-lucide="package-search" className="w-5 h-5 mr-2 text-brand-500"></i> Lifetime Product Performance
                                </h4>
                                <div className="space-y-4 mt-6">
                                    <div>
                                        <div className="flex justify-between text-sm mb-1">
                                            <span className="font-semibold text-gray-700">Dior Sauvage</span>
                                            <span className="font-bold text-brand-600">₹8,45,000</span>
                                        </div>
                                        <div className="w-full bg-gray-100 rounded-full h-2">
                                            <div className="bg-brand-600 h-2 rounded-full" style={{ width: '85%' }}></div>
                                        </div>
                                    </div>
                                    <div>
                                        <div className="flex justify-between text-sm mb-1">
                                            <span className="font-semibold text-gray-700">Chanel No. 5</span>
                                            <span className="font-bold text-brand-600">₹6,20,000</span>
                                        </div>
                                        <div className="w-full bg-gray-100 rounded-full h-2">
                                            <div className="bg-pink-400 h-2 rounded-full" style={{ width: '65%' }}></div>
                                        </div>
                                    </div>
                                    <div>
                                        <div className="flex justify-between text-sm mb-1">
                                            <span className="font-semibold text-gray-700">Tom Ford Oud</span>
                                            <span className="font-bold text-brand-600">₹4,10,000</span>
                                        </div>
                                        <div className="w-full bg-gray-100 rounded-full h-2">
                                            <div className="bg-yellow-500 h-2 rounded-full" style={{ width: '45%' }}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="border border-gray-200 rounded-xl p-5 bg-white shadow-sm hover:shadow-md transition">
                                <h4 className="font-bold text-gray-700 flex items-center mb-4">
                                    <i data-lucide="bar-chart-horizontal" className="w-5 h-5 mr-2 text-brand-500"></i> Monthly / Yearly Aggregation
                                </h4>
                                <table className="w-full text-left text-sm mt-4">
                                    <thead>
                                        <tr className="border-b text-gray-500 uppercase text-xs">
                                            <th className="pb-2">Period</th>
                                            <th className="pb-2 text-right">Revenue</th>
                                            <th className="pb-2 text-right">Growth</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100 font-medium">
                                        <tr>
                                            <td className="py-3 text-gray-800">This Month (Oct)</td>
                                            <td className="py-3 text-right text-brand-800">₹3,45,000</td>
                                            <td className="py-3 text-right text-green-500 flex justify-end items-center"><i data-lucide="trending-up" className="w-3 h-3 mr-1"></i> 18%</td>
                                        </tr>
                                        <tr>
                                            <td className="py-3 text-gray-800">Last Month (Sep)</td>
                                            <td className="py-3 text-right text-brand-800">₹2,92,000</td>
                                            <td className="py-3 text-right text-red-500 flex justify-end items-center"><i data-lucide="trending-down" className="w-3 h-3 mr-1"></i> 4%</td>
                                        </tr>
                                        <tr className="bg-brand-50 rounded pl-2">
                                            <td className="py-3 text-brand-900 font-bold border-t border-brand-200 pl-2">Year to Date (2024)</td>
                                            <td className="py-3 text-right text-brand-900 border-t border-brand-200 font-bold pr-2">₹42,85,000</td>
                                            <td className="py-3 text-right text-green-600 border-t border-brand-200 font-bold flex justify-end items-center pr-2"><i data-lucide="trending-up" className="w-4 h-4 mr-1"></i> 32%</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Render Application & Initialize Icons ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminPortal />);

        // Initialize Lucide icons after render
        setTimeout(() => {
            lucide.createIcons();
        }, 100);

        // Re-initialize icons whenever user clicks tab (to grab newly rendered icons)
        document.addEventListener('click', () => {
            setTimeout(() => {
                lucide.createIcons();
            }, 50);
        });
    </script>
</body>

</html>
