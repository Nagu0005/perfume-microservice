replicaCount: 1

image:
  repository: perfume-payment-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 7003

probes:
  enabled: true
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

ingress:
  enabled: false

env:
  PORT: "7003"
  NODE_ENV: "production"
  DB_HOST: "db"
  DB_NAME: "payment_db"

# Sensitive values — override these or use external secret management
secrets:
  DB_USER: "postgres"
  DB_PASSWORD: "postgres"

# Keys from the Secret to inject as env vars
secretKeys:
  - DB_USER
  - DB_PASSWORD

