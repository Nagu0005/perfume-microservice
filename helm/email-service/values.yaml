replicaCount: 1

image:
  repository: perfume-email-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 7005

probes:
  enabled: true
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

ingress:
  enabled: false

env:
  PORT: "7005"
  NODE_ENV: "production"
  DB_HOST: "db"
  DB_NAME: "email_db"
  SMTP_HOST: "smtp.ethereal.email"
  SMTP_PORT: "465"
  SMTP_SECURE: "true"

# Sensitive values — override these or use external secret management
secrets:
  DB_USER: "postgres"
  DB_PASSWORD: "postgres"
  SMTP_USER: "yuz25warufuixewz@ethereal.email"
  SMTP_PASS: "ttAXXqHj24Nn38M1Jd"

# Keys from the Secret to inject as env vars
secretKeys:
  - DB_USER
  - DB_PASSWORD
  - SMTP_USER
  - SMTP_PASS

