apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-service
  template:
    metadata:
      labels:
        app: email-service
    spec:
      containers:
        - name: email-service
          image: perfume-email-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7005
          env:
            - name: PORT
              value: "7005"
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              value: "db"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_NAME
              value: "email_db"
            - name: SMTP_HOST
              value: "smtp.ethereal.email"
            - name: SMTP_PORT
              value: "465"
            - name: SMTP_SECURE
              value: "true"
            - name: SMTP_USER
              value: "yuz25warufuixewz@ethereal.email"
            - name: SMTP_PASS
              value: "ttAXXqHj24Nn38M1Jd"
---
apiVersion: v1
kind: Service
metadata:
  name: email-service
spec:
  type: ClusterIP
  ports:
    - port: 7005
      targetPort: 7005
  selector:
    app: email-service
